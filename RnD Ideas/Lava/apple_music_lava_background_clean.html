<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Apple Music Lava Background</title>
<style>
  :root {
    --pink: #ff2d55;
    --orange: #ff7a18;
    --violet: #a633ff;
    --blue: #1677ff;
    --black: #08020d;
  }

  * { box-sizing: border-box; }

  html,
  body {
    width: 100%;
    min-height: 100%;
    margin: 0;
  }

  body {
    overflow: hidden;
    background: var(--black);
  }

  .lava-background {
    position: fixed;
    inset: -18vmax;
    overflow: hidden;
    background:
      radial-gradient(circle at 22% 24%, rgba(255, 45, 85, .92), transparent 28%),
      radial-gradient(circle at 75% 23%, rgba(255, 122, 24, .9), transparent 28%),
      radial-gradient(circle at 58% 72%, rgba(166, 51, 255, .9), transparent 31%),
      radial-gradient(circle at 20% 78%, rgba(22, 119, 255, .88), transparent 28%),
      linear-gradient(135deg, #0d0217 0%, #180615 40%, #07020c 100%);
    filter: blur(34px) saturate(1.55) contrast(1.08);
    transform-origin: center;
    animation: drift 18s ease-in-out infinite alternate;
  }

  .lava-background::before,
  .lava-background::after {
    content: "";
    position: absolute;
    inset: 5%;
    background:
      radial-gradient(circle at 35% 38%, rgba(255, 255, 255, .22), transparent 9%),
      radial-gradient(circle at 58% 42%, rgba(255, 45, 85, .72), transparent 22%),
      radial-gradient(circle at 42% 65%, rgba(255, 180, 70, .66), transparent 21%),
      radial-gradient(circle at 72% 62%, rgba(70, 70, 255, .66), transparent 22%),
      radial-gradient(circle at 25% 60%, rgba(255, 0, 140, .58), transparent 20%);
    mix-blend-mode: screen;
    filter: blur(46px) saturate(1.4);
    animation: blob-spin 24s cubic-bezier(.45, 0, .25, 1) infinite;
  }

  .lava-background::after {
    inset: 0;
    opacity: .66;
    transform: rotate(40deg) scale(1.08);
    animation: blob-swim 16s ease-in-out infinite alternate;
  }

  .grain,
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  .grain {
    opacity: .16;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.55'/%3E%3C/svg%3E");
  }

  .vignette {
    background:
      radial-gradient(circle at center, transparent 0 48%, rgba(0, 0, 0, .52) 100%),
      linear-gradient(to bottom, rgba(0, 0, 0, .14), rgba(0, 0, 0, .48));
  }

  @keyframes drift {
    0% { transform: translate3d(-2%, -1%, 0) rotate(0deg) scale(1.03); }
    50% { transform: translate3d(2%, 2%, 0) rotate(10deg) scale(1.09); }
    100% { transform: translate3d(-1%, 3%, 0) rotate(-8deg) scale(1.05); }
  }

  @keyframes blob-spin {
    0% { transform: translate(-4%, 2%) rotate(0deg) scale(1.02); }
    50% { transform: translate(4%, -3%) rotate(140deg) scale(1.15); }
    100% { transform: translate(-2%, 1%) rotate(360deg) scale(1.04); }
  }

  @keyframes blob-swim {
    from { transform: translate(-3%, 3%) rotate(35deg) scale(1.06); }
    to { transform: translate(4%, -4%) rotate(-25deg) scale(1.16); }
  }
</style>
</head>
<body>
  <div class="lava-background" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
</body>
</html>
